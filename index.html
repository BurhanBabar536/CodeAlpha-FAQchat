<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 420px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .chat-header {
      background: #4f46e5;
      color: white;
      padding: 16px 20px;
      font-size: 16px;
      font-weight: bold;
    }

    .chat-box {
      height: 380px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
    }

    .user-msg {
      background: #4f46e5;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    .bot-msg {
      background: #f1f0f0;
      color: #333;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }

    .chat-input {
      display: flex;
      border-top: 1px solid #eee;
      padding: 12px;
      gap: 8px;
    }

    .chat-input input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    .chat-input input:focus {
      border-color: #4f46e5;
    }

    .chat-input button {
      padding: 10px 18px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .chat-input button:hover {
      background: #4338ca;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">FAQ Chatbot</div>

  <div class="chat-box" id="chat-box">
    <div class="message bot-msg">Hello! Ask me anything. I will find the best answer for you.</div>
  </div>

  <div class="chat-input">
    <input type="text" id="user-input" placeholder="Type your question..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const input = document.getElementById('user-input');
  const chatBox = document.getElementById('chat-box');

  // Allow pressing Enter to send
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendMessage();
  });

  async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    // Show user message
    appendMessage(message, 'user-msg');
    input.value = '';

    // Show typing indicator
    const typing = appendMessage('Typing...', 'bot-msg');

    try {
      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: message })
      });

      const data = await response.json();

      // Replace typing indicator with actual reply
      typing.textContent = data.reply;

    } catch (error) {
      typing.textContent = 'Something went wrong. Please try again.';
    }
  }

  function appendMessage(text, className) {
    const div = document.createElement('div');
    div.className = 'message ' + className;
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    return div;
  }
</script>

</body>
</html>
